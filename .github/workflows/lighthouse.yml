name: Lighthouse

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll
        run: JEKYLL_ENV=production bundle exec jekyll build --trace

      - name: Serve site
        run: npx --yes http-server _site -p 8080 -s &

      - name: Wait for server
        run: npx --yes wait-on http://localhost:8080

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/index.html
            http://localhost:8080/no-mans-sky-explorer/index.html
            http://localhost:8080/faq/index.html
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
