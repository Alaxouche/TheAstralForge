    - Load Order
- id: update-modlist
  question: "How do I update my Wunduniik modlist?"
  answer: |
    Updating is similar to a first install:
    
    - Keep your existing download folder to reuse unchanged files.
    - Download the new Wabbajack file and extract it.
    - Open Wabbajack, select the `Wunduniik.wabbajack` file, and choose **Overwrite location**.
    - Click **Start**.
    
    Note: Mods you added manually will be removed unless you rename them with the `[NoDelete]` prefix.
  tags:
    - Installation
    - Updates
- id: nsfw-options
  question: "How do I activate the NSFW options?"
  answer: "Wunduniik no longer includes NSFW. There is an optional Bodyslide folder with nude bodies in the optional mods separator."
  tags:
    - Optional Mods
- id: widescreen-support
  question: "How do I add widescreen support?"
  answer: "Widescreen support is automatic. The mod manager detects your ratio and enables it for you."
  tags:
    - Display
- id: change-preset
  question: "I don't like the current character preset. How do I change it?"
  answer: "Press **O** to open Obody, pick a preset from the list, and it will swap your body morph."
  tags:
    - Gameplay
    - Character
