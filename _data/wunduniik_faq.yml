- id: compass-undiscovered
  question: "My compass doesn't show undiscovered locations!"
  answer: "Open Compass Navigation Overhaul and set `bShowUndiscoveredLocationMarkers=1`."
  tags:
    - Gameplay
    - UI
- id: main-quest-start
  question: "How do I start the main quest in this list?"
  answer: |
    Head to Helgen's Inn and talk to the innkeeper. Choose the extra dialog option:
    
    - "I'd like to rent a room. (Start Intro (10 gold))"
    
    The first sleep is normal; the next time you sleep there, the intro will begin.
  tags:
    - Quests
    - Gameplay
- id: keep-load-order
  question: "When I exit the game, a popup asks to keep load order changes. What should I do?"
  answer: "Click **No**. Letting the game sort plugins can break the load order."
  tags:
    - Mod Organizer
    - Load Order
